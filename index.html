<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
    height: 600px; /* ここの数値は適宜調整してください */
    width: 100%;
}
    </style>
</head>
<body>
    <h1>スネイリ民主主義共和国・国土防衛マップ</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
        // 地図の初期化（サハリンにフォーカス）
        const map = L.map('map').setView([46.97, 142.73], 7);

        // OSM（OpenStreetMap）のタイルレイヤーを使用（無料！）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 都市や基地を追加する関数
        function createBase(lat, lng, name, type) {
            const color = (type === 'city') ? 'blue' : 'red'; // 都市は青、基地は赤
            return L.circleMarker([lat, lng], {
                color: color,
                radius: 10
            }).addTo(map).bindPopup(name);
        }

        // 初期拠点の配置
        createBase(46.97, 142.73, "首都スネイリ", "city");
    // 基地データ管理用リスト（スネイリ共和国のデータベース）
    let bases = [];

    // 地図をクリックした時のイベントリスナー
    map.on('click', function(e) {
        // クリックした地点の緯度経度を取得
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        const baseName = "基地_" + (bases.length + 1);

        // リスト（配列）にデータを追加
        bases.push({
            name: baseName,
            lat: lat,
            lng: lng,
            hp: 100
        });

        // 地図上にマーカーを配置
        L.circleMarker([lat, lng], { color: 'red', radius: 8 }).addTo(map).bindPopup(baseName);
        
        console.log("現在の共和国データ:", bases);
    });
    </script>
</body>
</html>
